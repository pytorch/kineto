name: Lint

on:
  pull_request:

# Linting is separate from tests - this only checks code formatting
jobs:
  lint:
    if: false # TODO: Temporarily disabled until lintrunner issues are resolved
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          pip install lintrunner

      - name: Initialize lintrunner
        run: |
          lintrunner init

      - name: Run lintrunner on changed files
        if: github.event_name == 'pull_request'
        run: |
          set +e
          lintrunner --take CLANGFORMAT,NEWLINE,SPACES,TABS --merge-base-with origin/${{ github.base_ref }}
          status=$?
          if [ $status -ne 0 ]; then
            echo ""
            echo "❌ Linting failed! Please run 'lintrunner -a' locally to fix issues."
            echo ""
            exit $status
          fi

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check license headers
        run: |
          find . \
            \( -name "*.py" -o -name "*.cpp" -o -name "*.h" -o -name "*.cu" -o -name "*.cuh" -o -name "*.sh" \) \
            -type f \
            -not -path "./.git/*" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            -not -path "*/build/*" \
            | xargs python .github/scripts/check_license_headers.py
